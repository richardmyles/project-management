<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0ef;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, "Helvetica Neue", sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .card {
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .monogram {
    width: 64px;
    height: 64px;
    background: #0F3A85;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 4px 16px rgba(15,58,133,0.25);
  }

  .monogram svg {
    width: 36px;
    height: 36px;
    fill: #fff;
  }

  .title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 26px;
    font-weight: 700;
    color: #0F3A85;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 12px;
    color: #999;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #0F3A85;
    opacity: 0.2;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
    40%           { opacity: 1;   transform: scale(1.25); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="monogram">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div class="title">My Projects</div>
    <div class="subtitle">Project &amp; Goals Tracker</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
