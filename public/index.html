<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>
<style>
:root{--red:#E1251B;--blue:#0F3A85;--primary:#0F3A85;--green:#144B2D;--gold:#FFC709;--dk:#212121;--purple:#7B2D8E;--blush:#f5f0ef;--sage:#C6DCD8;--ice:#E4EBF1;--fh:'Times New Roman',Georgia,serif;--fb:Arial,'Helvetica Neue',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--blush);color:var(--dk);min-height:100vh}
button,input,select,textarea{font-family:var(--fb)}button{cursor:pointer}

.hdr{background:var(--primary);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:16px}
.hdr-t{font-family:var(--fh);font-size:20px;font-weight:700}
.hdr-s{font-size:10px;opacity:.8}
.hdr-search{flex:1;max-width:320px;position:relative}
.hdr-search input{width:100%;padding:6px 12px 6px 30px;border:none;border-radius:20px;font-size:12px;background:rgba(255,255,255,.18);color:#fff;outline:none;transition:all .2s}
.hdr-search input::placeholder{color:rgba(255,255,255,.6)}
.hdr-search input:focus{background:rgba(255,255,255,.95);color:var(--dk)}
.hdr-search input:focus::placeholder{color:#999}
.hdr-search::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.6;pointer-events:none}
.hdr-r{display:flex;align-items:center;gap:10px;margin-left:auto}
.ub{background:rgba(255,255,255,.15);border:none;color:#fff;padding:3px 8px;font-size:11px;border-radius:3px;transition:all .15s}
.ub:hover:not(:disabled){background:rgba(255,255,255,.3)}.ub:disabled{opacity:.3;cursor:default}
.wrap{max-width:1440px;margin:0 auto;padding:14px 24px 40px}

/* Search results overlay */
.sr{position:fixed;top:44px;left:50%;transform:translateX(-50%);width:500px;max-width:90vw;max-height:60vh;overflow:auto;background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:999;display:none}
.sr.open{display:block}
.sr-item{padding:10px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;transition:background .1s}
.sr-item:hover{background:#f5f5f5}
.sr-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;color:#fff;margin-right:6px}
.sr-type{font-size:9px;color:#999;margin-left:6px}

/* Summary */
.sum{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.sc{background:#fff;border-radius:8px;padding:11px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sc-l{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:2px}
.sc-v{font-size:22px;font-weight:700;font-family:var(--fh)}
.sc-s{font-size:9px;color:#bbb}

.tabs{display:flex;gap:0;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.tb{padding:7px 12px;font-size:10px;font-weight:600;border:none;background:#fff;color:var(--blue);transition:all .15s}
.tb:first-child{border-radius:6px 0 0 6px}.tb.on{background:var(--primary);color:#fff}
.btn{padding:7px 16px;font-size:12px;font-weight:600;border:none;border-radius:4px;color:#fff;transition:all .15s}
.btn.sm{padding:4px 12px;font-size:11px}.btn.ol{background:transparent;border:1.5px solid currentColor;color:var(--dk)}.btn:disabled{opacity:.5;cursor:default}

.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.card-h{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.card-b{padding:0 16px 16px;border-top:1px solid #eee}
.pg{display:flex;height:6px;border-radius:3px;overflow:hidden;background:#e0e0e0}.pg>div{transition:width .3s}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sh-t{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px}
.sh-a{font-size:10px;color:var(--blue);border:none;background:none;font-weight:600;cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.x-btn{border:none;background:none;color:#999;font-size:16px;cursor:pointer;padding:0}.x-btn:hover{color:var(--red)}

/* Milestone rows */
.ms-h{display:grid;grid-template-columns:40px 1fr 96px 106px 28px;gap:5px;padding:5px 0;border-bottom:2px solid var(--primary)}
.ms-h span{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
.ms-r{display:grid;grid-template-columns:40px 1fr 96px 106px 28px;gap:5px;align-items:center;padding:6px 0;border-bottom:1px solid #f5f0ef;cursor:pointer}
.ms-r:hover{background:#fdfafa}
.ms-r.dn{opacity:.5}
.ms-exp{padding:10px 16px 14px 16px;background:#faf8f7;border-bottom:1px solid #f0e0dd;font-size:12px}
.ms-exp-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.ms-exp-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;min-width:56px;padding-top:3px}
.ms-exp-content{flex:1}
.ms-bullet{display:flex;align-items:flex-start;gap:4px;padding:2px 0}
.ms-bullet-dot{color:var(--blue);margin-top:1px;flex-shrink:0}
.ms-bullet input{flex:1;font-size:11px;padding:2px 6px;border:1px solid transparent;border-radius:3px;background:transparent}
.ms-bullet input:hover{border-color:#ddd}
.ms-bullet input:focus{border-color:var(--blue);outline:none;background:#fff}
.ms-link{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px}
.ms-link a{color:var(--blue);text-decoration:none}
.ms-link a:hover{text-decoration:underline}
.proj-links{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 12px;padding:8px 12px;background:#f8f6f5;border-radius:6px}
.proj-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;padding:3px 10px;border-radius:14px;background:#fff;border:1px solid #e0e0e0;transition:all .15s}
.proj-link:hover{border-color:var(--blue);background:var(--ice)}
.ms-mv{border:none;background:none;color:#ccc;font-size:10px;cursor:pointer;padding:1px 3px;border-radius:2px;line-height:1}
.ms-mv:hover{color:var(--blue);background:#f0f0f0}
.ie{background:transparent;border:1px solid transparent;border-radius:3px;padding:2px 4px;font-size:12px;color:var(--dk);width:100%}
.ie:hover{border-color:#ddd}.ie:focus{border-color:var(--blue);outline:none;background:#fff}
.ie-date{font-size:11px;color:#777;width:100%;background:transparent;border:1px solid transparent;border-radius:3px;padding:2px 3px}
.ie-date:hover{border-color:#ddd}.ie-date:focus{border-color:var(--blue);outline:none;background:#fff}
.ie-note{font-size:10px;color:#888;width:100%;background:transparent;border:1px solid transparent;border-radius:3px;padding:1px 4px;margin-top:1px}
.ie-note:hover{border-color:#ddd}.ie-note:focus{border-color:var(--blue);outline:none;background:#fff}
.ie-note::placeholder{color:#ccc;font-style:italic}
.ie-desc{width:100%;font-size:12px;color:#555;background:transparent;border:1px solid transparent;border-radius:4px;padding:6px 8px;resize:vertical;min-height:36px;line-height:1.5}
.ie-desc:hover{border-color:#ddd}.ie-desc:focus{border-color:var(--blue);outline:none;background:#fff}
.ms-sel{font-size:10px;padding:3px 3px;border-radius:3px;font-weight:600;background:#fff;cursor:pointer}

/* Timeline */
.tl-wrap{overflow-x:auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:16px}
.tl-row{display:flex;align-items:center;margin-bottom:2px;min-height:32px}
.tl-label{min-width:80px;font-size:11px;font-weight:700;flex-shrink:0;padding-right:10px}
.tl-track{flex:1;position:relative;height:28px;background:#f8f6f5;border-radius:4px;overflow:hidden}
.tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;cursor:pointer;z-index:2;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tl-dot:hover{transform:translate(-50%,-50%) scale(1.4)}
.tl-bar{position:absolute;top:8px;height:12px;border-radius:6px;opacity:.25}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:3;opacity:.6}
.tl-months{display:flex;border-bottom:1px solid #eee;margin-bottom:8px;padding-left:80px}
.tl-month{font-size:9px;color:#999;text-align:center;border-left:1px solid #f0f0f0;padding:2px 0}
.tl-tip{position:fixed;background:var(--dk);color:#fff;padding:6px 10px;border-radius:4px;font-size:11px;z-index:100;pointer-events:none;display:none;max-width:280px;line-height:1.3}

/* Kanban Board */
.kb{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-height:300px}
.kb-col{background:#f8f6f5;border-radius:8px;padding:10px;min-height:200px}
.kb-col-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;border-radius:4px;color:#fff;margin-bottom:8px;text-align:center}
.kb-card{background:#fff;border-radius:6px;padding:8px 10px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.kb-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);transform:translateY(-1px)}
.kb-card-proj{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;color:#fff;display:inline-block;margin-bottom:3px}
.kb-card-name{font-size:11px;font-weight:600;color:var(--dk);line-height:1.3}
.kb-card-date{font-size:9px;color:#999;margin-top:2px}
.kb-card-date.overdue{color:var(--red);font-weight:600}
.kb-count{font-size:9px;opacity:.7;font-weight:400}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dash-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.dash-card-t{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:10px}
.health-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f8f8f8}
.health-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.act-item{padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:11px;display:flex;gap:6px;align-items:flex-start}

/* Journal */
.je{padding:8px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:8px;align-items:flex-start}
.pill{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s}
.re-proj label{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:6px;border:1.5px solid #ddd;transition:all .15s}
.re-proj label:has(input:checked){border-color:var(--blue);background:var(--blue);color:#fff}.re-proj input[type=checkbox]{display:none}
.rp{background:#f8f6f5;border-radius:6px;padding:14px 16px;font-size:11px;font-family:'Cascadia Code',Consolas,monospace;white-space:pre-wrap;overflow:auto;color:var(--dk);line-height:1.5;max-height:500px}

.mo{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);padding:16px}
.mo-c{background:#fff;border-radius:10px;width:520px;max-width:95vw;max-height:85vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.mo-note{width:min(820px,96vw);max-height:94vh;}
.mo-h{padding:14px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.mo-t{font-family:var(--fh);font-size:16px;font-weight:700}.mo-b{padding:20px}
.mf{margin-bottom:12px}.ml{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.mi{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:4px}.mi:focus,.mt:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 2px rgba(15,58,133,.15)}
.mt{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:4px;resize:vertical;min-height:60px}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 20px;border-radius:6px;font-size:12px;font-weight:600;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.footer{text-align:center;padding:24px 0 8px;font-size:9px;color:#ccc}
@media(max-width:700px){.sum{grid-template-columns:repeat(3,1fr)}.g2,.dash-grid{grid-template-columns:1fr}.kb{grid-template-columns:repeat(3,1fr)}.ms-h,.ms-r{grid-template-columns:32px 1fr 80px 86px 24px}.wd-3col{grid-template-columns:1fr}}
@media(min-width:1300px){.g2{grid-template-columns:1fr 1fr 1fr}.dash-grid{grid-template-columns:1fr 1fr 1fr}.sum{grid-template-columns:repeat(5,1fr)}.kb{grid-template-columns:repeat(5,1fr)}.hdr-search{max-width:480px}.wrap{padding:16px 32px 48px}}
.setup-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center}
@keyframes spin{to{transform:rotate(360deg)}}
.setup-card{background:#fff;border-radius:12px;padding:32px;width:420px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.setup-card h2{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--primary);margin-bottom:6px}
.setup-card p{font-size:12px;color:#888;margin-bottom:20px}
.wd-cat-hd{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;padding:4px 0 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--primary);margin-bottom:10px}
.wd-card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px;overflow:hidden;border:1px solid #edf0f4}
.wd-card-hd{padding:14px 16px 12px;border-bottom:1px solid #f0f0f0;background:#fafbfc}
.wd-card-body{padding:14px 16px}
.wd-label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.wd-value{font-size:12px;color:#333;line-height:1.5}
.wd-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:10px}
.wd-sep{border:none;border-top:1px solid #f0f0f0;margin:10px 0 8px}
.wd-status-sel{font-size:11px;padding:4px 8px;border-radius:12px;font-weight:600;cursor:pointer;background:#fff;border-width:1.5px;border-style:solid;width:100%}
.sug-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--primary);color:var(--primary);background:#fff;cursor:pointer;transition:all .15s;margin:2px}
.sug-chip.on{background:var(--primary);color:#fff}
.notes-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:calc(100vh - 160px);overflow:hidden;}
.notes-sidebar{border-right:1px solid #f0e0dd;padding:12px 0;height:100%;overflow-y:auto;}
.notes-main{height:100%;overflow-y:auto;}
.ord-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:8px;padding:0 1px;line-height:1;vertical-align:middle;}.ord-btn:hover{color:#555;}
.gb-si-row{display:flex;align-items:center;gap:6px;background:#f0f4f8;border-radius:4px;padding:5px 8px;margin-bottom:3px;}
.nb-row{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700;}
.nb-row:hover{background:#faf8f7;}
.nb-row.on{color:var(--blue);}
.sec-row{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 28px;cursor:pointer;font-size:11px;}
.sec-row:hover{background:#faf8f7;}
.sec-row.on{color:var(--blue);font-weight:700;}
.note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:12px 0 0 16px;}
.note-card{background:#fff;border-radius:8px;border:1px solid #eee;padding:12px;cursor:pointer;transition:box-shadow .15s;}
.note-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.note-card.pinned{border-top:3px solid var(--gold);}
.mp-wrap{position:relative;user-select:none;}
.mp-trigger{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:5px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;font-size:12px;background:#fff;min-height:34px;}
.mp-trigger:hover{border-color:#bbb;}
.mp-trigger.open{border-color:var(--blue);box-shadow:0 0 0 2px #d6e0f5;}
.mp-trigger-ph{color:#aaa;font-size:11px;font-style:italic;}
.mp-chip-sm{background:#e8edf8;color:var(--blue);padding:2px 7px;border-radius:10px;font-size:10px;white-space:nowrap;}
.mp-arrow{color:#aaa;font-size:9px;margin-left:auto;flex-shrink:0;padding-left:4px;}
.mp-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:300;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none;}
.mp-drop.open{display:block;}
.mp-search{display:block;width:100%;box-sizing:border-box;border:none;border-bottom:1px solid #f0f0f0;padding:7px 10px;font-size:11px;outline:none;border-radius:6px 6px 0 0;}
.mp-list{max-height:180px;overflow-y:auto;}
.mp-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:11px;border-bottom:1px solid #fafafa;}
.mp-item:last-child{border-bottom:none;}
.mp-item:hover{background:#f5f7ff;}
.mp-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:var(--blue);}
.imp-dropzone{border:2px dashed #ddd;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.imp-dropzone:hover,.imp-dropzone.drag{border-color:var(--blue);background:#f5f8ff;}
.imp-file-row{display:flex;align-items:center;gap:8px;background:#f5f7fa;border-radius:4px;padding:5px 10px;font-size:11px;margin-top:4px;}
</style>
</head>
<body>
<div id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#888">Loading…</div></div>
<div class="sr" id="sr"></div>
<div class="tl-tip" id="tip"></div>
<div class="toast" id="toast"></div>
<script>
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const td=()=>new Date().toISOString().split("T")[0];
const fd=d=>{if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})};
const fdf=d=>{if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})};
const dt=d=>{if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date(td()+"T00:00:00"))/864e5)};
const esc=s=>{const d=document.createElement("div");d.textContent=s;return d.innerHTML};
const ST=[{v:"complete",l:"Complete",bg:"#144B2D"},{v:"in-progress",l:"In Progress",bg:"#0F3A85"},{v:"at-risk",l:"At Risk",bg:"#FFC709"},{v:"blocked",l:"Blocked",bg:"#E1251B"},{v:"not-started",l:"Not Started",bg:"#9E9E9E"}];
const SM=Object.fromEntries(ST.map(s=>[s.v,s]));
const JT=[{v:"decision",l:"Decision",i:"✓"},{v:"lesson",l:"Lesson",i:"💡"},{v:"risk",l:"Risk",i:"⚠"},{v:"action",l:"Action",i:"→"},{v:"note",l:"Note",i:"📝"},{v:"meeting",l:"Meeting",i:"📅"}];
const JM=Object.fromEntries(JT.map(j=>[j.v,j]));
const PC=["#0F3A85","#144B2D","#7B2D8E","#F58E7D","#511207","#0A6E5C","#C4571A"];
const SV={high:"#E1251B",medium:"#FFC709",low:"#0F3A85"};

let state={projects:[],journal:[]},cfg={name:"",team:"",org:"",primaryColor:"#0F3A85",setupComplete:false};
let goals={},goalMap={mappings:[]},reports=[],archive=[],hist={undo:0,redo:0};
let tab="dashboard",exp={},jf="all",expMs={},expTk={},expGoals={};
let npGoalRefs=[],taskFilter="all",goalYear=new Date().getFullYear(),reportQuarters=new Set(),pgPickerOpen=null,goalQSel={};
let notes=[],nFilter={nb:null,sec:null},noteSearch="",noteNbOpen={},noteView="notes",noteExportMode=false,noteExportSel=new Set();
let noteNbOrder=JSON.parse(localStorage.getItem('noteNbOrder')||'[]'),noteSecOrder=JSON.parse(localStorage.getItem('noteSecOrder')||'{}');
let profile=null,profileEditMode=false;
let on1Notes=[];
let noteEditId=null,noteEditNote=null;
let goalBuilderOpen=false,goalBuilderState={};let goalDetailView=null;
let goalCats=[],goalCatMgrOpen=false;
let scanState="idle",scanSuggestions=null,scanSelected={},scanNoteTitle="";
let memoryContent="";
let briefingData=null,briefingStatus={status:"idle"},briefingPoll=null,briefingElapsedTick=null;

async function load(){
  try{
    [state,cfg,goals,goalMap,reports,archive,hist]=await Promise.all([api("/api/state"),api("/api/config"),api("/api/goals"),api("/api/goals/map"),api("/api/reports"),api("/api/archive"),api("/api/history/count")]);
    const memR=await api("/api/memory").catch(()=>({content:""}));memoryContent=memR.content||"";
    notes=await api("/api/notes").catch(()=>[]);
    goalCats=await api("/api/goals/categories/"+goalYear).catch(()=>[]);
    profile=await api("/api/profile").catch(()=>null);
    on1Notes=await api("/api/1on1").catch(()=>[]);
    if(profile?.memory)memoryContent=profile.memory;
    const bRef=await api("/api/briefing").catch(()=>({data:null,status:{status:"idle"}}));
    briefingData=bRef.data;briefingStatus=bRef.status||{status:"idle"};
    // Auto-run briefing if not run today and not already running
    if(briefingStatus.status!=="running"){
      const lastRun=briefingData?.metadata?.generated_at;
      const isToday=lastRun&&new Date(lastRun).toDateString()===new Date().toDateString();
      if(!isToday){api("/api/briefing/run",{method:"POST"}).then(()=>{briefingStatus={status:"running",startedAt:new Date().toISOString()};startBriefingPoll();startElapsedTick();});}
    } else { startBriefingPoll();startElapsedTick(); }
  }catch(e){console.error(e);}
  document.documentElement.style.setProperty("--primary",cfg.primaryColor||"#0F3A85");
  document.title=(cfg.name?cfg.name+"'s Projects":"My Projects");
  if(!cfg.setupComplete)showSetup();else render();
}

function getAllGoals(){return Object.entries(goals).flatMap(([yr,yrData])=>(yrData.goals||[]).filter(g=>g.status!=='discontinued').map(g=>({...g,_year:parseInt(yr)})));}
function topGoalYear(){const keys=Object.keys(goals).map(Number);return keys.length?Math.max(...keys):new Date().getFullYear();}
function parseGoalRef(ref){if(!ref)return{year:topGoalYear(),id:ref};if(ref.includes(':')){const c=ref.indexOf(':');return{year:parseInt(ref.slice(0,c)),id:ref.slice(c+1)};}return{year:topGoalYear(),id:ref};}
function makeGoalRef(id,year){return (year||topGoalYear())+':'+id;}
const STOP=new Set(["the","a","an","is","are","to","for","and","or","of","in","on","with","that","this","be","by","at","it","its","as","was","has","have","will","we","our","my","your","from","into","about","not","but","so","if","when","then","their","they","all","each","new","can","may","should","would","could","been","had"]);
function suggestGoals(text,topN=3){const words=text.toLowerCase().split(/\W+/).filter(w=>w.length>3&&!STOP.has(w));if(!words.length)return[];return getAllGoals().map(g=>{const hay=(g.text+' '+(g.subItems||[]).join(' ')+' '+g.category).toLowerCase();const s=words.filter(w=>hay.includes(w)).length/words.length;return{...g,_s:s};}).filter(g=>g._s>0.05).sort((a,b)=>b._s-a._s).slice(0,topN);}

window.doSearch=q=>{
  const sr=document.getElementById("sr");
  if(!q||q.length<2){sr.classList.remove("open");return;}
  const ql=q.toLowerCase();
  const results=[];
  state.projects.filter(p=>!p.archived).forEach(p=>{
    if(p.name.toLowerCase().includes(ql)||p.shortName.toLowerCase().includes(ql))results.push({type:"project",text:p.name,tag:p.shortName,color:p.color,pid:p.id});
    p.milestones.forEach(m=>{if(m.name.toLowerCase().includes(ql)||(m.notes||"").toLowerCase().includes(ql))results.push({type:"milestone",text:m.name,tag:p.shortName,color:p.color,sub:m.notes,pid:p.id});});
    p.dependencies.forEach(d=>{if(d.toLowerCase().includes(ql))results.push({type:"dependency",text:d,tag:p.shortName,color:p.color,pid:p.id});});
  });
  state.journal.forEach(j=>{if(j.text.toLowerCase().includes(ql)){const pr=state.projects.find(p=>p.id===j.project);results.push({type:"journal",text:j.text,tag:pr?.shortName||"ALL",color:pr?.color||"#888",date:j.date});}});
  if(!results.length){sr.innerHTML='<div style="padding:16px;text-align:center;color:#999;font-size:12px">No results for "'+esc(q)+'"</div>';sr.classList.add("open");return;}
  sr.innerHTML=results.slice(0,12).map(r=>'<div class="sr-item" onclick="'+(r.pid?"setTab(\'projects\');exp[\'"+r.pid+"\']=true;render();document.getElementById(\'sr\').classList.remove(\'open\')":"")+';"><span class="sr-tag" style="background:'+r.color+'">'+esc(r.tag)+'</span>'+esc(r.text)+'<span class="sr-type">'+r.type+'</span></div>').join("");
  sr.classList.add("open");
};

window.gbDescTab=function(e){
  const t=e.target;
  const s=t.selectionStart,end=t.selectionEnd;
  const val=t.value;
  const lineStart=val.lastIndexOf('\n',s-1)+1;
  const lineEnd=val.indexOf('\n',s);
  const lineEndIdx=lineEnd===-1?val.length:lineEnd;
  const line=val.substring(lineStart,lineEndIdx);

  if(e.key==='Tab'){
    e.preventDefault();
    if(!e.shiftKey){
      // Main bullet "• " → sub-bullet "  • "
      if(/^•\s/.test(line)){
        t.value=val.substring(0,lineStart)+'  '+line+val.substring(lineEndIdx);
        t.selectionStart=t.selectionEnd=s+2;
        return;
      }
      // Indent by 2 spaces
      t.value=val.substring(0,lineStart)+'  '+val.substring(lineStart);
      t.selectionStart=t.selectionEnd=s+2;
    } else {
      // Sub-bullet "  • " → main bullet "• "
      if(/^  •\s/.test(line)){
        t.value=val.substring(0,lineStart)+line.substring(2)+val.substring(lineEndIdx);
        t.selectionStart=t.selectionEnd=Math.max(lineStart,s-2);
        return;
      }
      const removed=line.startsWith('  ')?2:line.startsWith(' ')?1:0;
      if(removed){
        t.value=val.substring(0,lineStart)+line.substring(removed)+val.substring(lineEndIdx);
        t.selectionStart=t.selectionEnd=Math.max(lineStart,s-removed);
      }
    }
  } else if(e.key===' '){
    // "- " (dash then space) → bullet •
    const beforeCursor=val.substring(lineStart,s);
    if(/^(\s*)-$/.test(beforeCursor)){
      e.preventDefault();
      const spaces=beforeCursor.slice(0,-1);
      t.value=val.substring(0,lineStart)+spaces+'• '+val.substring(s);
      t.selectionStart=t.selectionEnd=lineStart+spaces.length+2;
    }
  } else if(e.key==='Enter'){
    // Auto-continue bullet on next line (preserves leading spaces for sub-bullets)
    const bulletMatch=val.substring(lineStart,s).match(/^(\s*)(•\s)/);
    if(bulletMatch){
      e.preventDefault();
      const cont='\n'+bulletMatch[1]+bulletMatch[2];
      t.value=val.substring(0,s)+cont+val.substring(end);
      t.selectionStart=t.selectionEnd=s+cont.length;
    }
  }
};
window.gbDescInsert=function(type){

  if(!t)return;
  const s=t.selectionStart,end=t.selectionEnd;
  const val=t.value;
  const sel=val.substring(s,end);
  const lineStart=val.lastIndexOf('\n',s-1)+1;
  const lineEndIdx=((idx=val.indexOf('\n',s))=>idx===-1?val.length:idx)();
  const line=val.substring(lineStart,lineEndIdx);
  if(type==='bullet'){
    if(/^•\s/.test(line)){
      t.value=val.substring(0,lineStart)+line.replace(/^•\s/,'')+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=Math.max(lineStart,s-2);
    } else if(/^  •\s/.test(line)){
      t.value=val.substring(0,lineStart)+line.substring(2)+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=Math.max(lineStart,s-2);
    } else {
      const clean=line.replace(/^\s*/,'');
      t.value=val.substring(0,lineStart)+'• '+clean+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=lineStart+2+(s-lineStart-Math.max(0,line.length-clean.length));
    }
  } else if(type==='subbullet'){
    if(/^  •\s/.test(line)){
      t.value=val.substring(0,lineStart)+line.substring(4)+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=Math.max(lineStart,s-4);
    } else if(/^•\s/.test(line)){
      t.value=val.substring(0,lineStart)+'  '+line+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=s+2;
    } else {
      const clean=line.replace(/^\s*/,'');
      t.value=val.substring(0,lineStart)+'  • '+clean+val.substring(lineEndIdx);
      t.selectionStart=t.selectionEnd=lineStart+4+(s-lineStart-Math.max(0,line.length-clean.length));
    }
  } else if(type==='underline'){
    if(s===end){
      t.value=val.substring(0,s)+'_text_'+val.substring(end);
      t.selectionStart=s+1;t.selectionEnd=s+5;
    } else {
      t.value=val.substring(0,s)+'_'+sel+'_'+val.substring(end);
      t.selectionStart=s;t.selectionEnd=end+2;
    }
  }
  t.focus();
};

// ═══ TIMELINE ═══
function rTimeline(ap){
  const allDates=ap.flatMap(p=>p.milestones.map(m=>m.target)).filter(Boolean).sort();
  if(!allDates.length) return '<div class="tl-wrap"><div style="text-align:center;padding:40px;color:#bbb">No milestones with dates to display.</div></div>';

  const startDate=new Date(Math.min(new Date(),new Date(allDates[0]+"T00:00:00")));
  startDate.setDate(1);// start of month
  const endRaw=new Date(allDates[allDates.length-1]+"T00:00:00");
  endRaw.setMonth(endRaw.getMonth()+2);
  const endDate=endRaw;
  const totalDays=Math.ceil((endDate-startDate)/864e5);
  const trackW=Math.max(600,totalDays*2.5);
  const pct=d=>{const days=Math.ceil((new Date(d+"T00:00:00")-startDate)/864e5);return Math.max(0,Math.min(100,(days/totalDays)*100));};

  // Months header
  const months=[];let cur=new Date(startDate);
  while(cur<endDate){const mDays=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();const daysInRange=Math.min(mDays,(endDate-cur)/864e5);months.push({label:cur.toLocaleDateString("en-US",{month:"short",year:"2-digit"}),width:(daysInRange/totalDays)*100});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}

  let h='<div class="tl-wrap"><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--blue);margin-bottom:12px">Project Timeline</div>';
  h+='<div style="overflow-x:auto"><div style="min-width:'+trackW+'px">';
  // Month headers
  h+='<div class="tl-months">'+months.map(m=>'<div class="tl-month" style="width:'+m.width+'%">'+m.label+'</div>').join('')+'</div>';

  const todayPct=pct(td());
  ap.forEach(p=>{
    h+='<div class="tl-row"><div class="tl-label" style="color:'+p.color+'">'+esc(p.shortName)+'</div><div class="tl-track">';
    // Today line
    h+='<div class="tl-today" style="left:'+todayPct+'%"></div>';
    // Project span bar
    const targets=p.milestones.map(m=>m.target).filter(Boolean).sort();
    if(targets.length>1){const l=pct(targets[0]),r=pct(targets[targets.length-1]);h+='<div class="tl-bar" style="left:'+l+'%;width:'+(r-l)+'%;background:'+p.color+'"></div>';}
    // Dots
    p.milestones.forEach(m=>{if(!m.target)return;const x=pct(m.target),sm=SM[m.status];
      h+='<div class="tl-dot" style="left:'+x+'%;background:'+sm.bg+'" onmouseenter="showTip(event,\''+esc(m.name).replace(/'/g,"\\'")+' — '+fd(m.target)+' ['+sm.l+']'+(m.notes?" — "+esc(m.notes).replace(/'/g,"\\'"):"")+'\',\''+p.color+'\')" onmouseleave="hideTip()"></div>';
    });
    h+='</div></div>';
  });
  h+='</div></div></div>';
  return h;
}
window.showTip=(e,text,color)=>{const tip=document.getElementById("tip");tip.innerHTML=text;tip.style.display="block";tip.style.left=Math.min(e.clientX+12,window.innerWidth-300)+"px";tip.style.top=(e.clientY-40)+"px";tip.style.borderLeft="3px solid "+color;};
window.hideTip=()=>{document.getElementById("tip").style.display="none";};

    h+='<div style="margin-top:8px;font-size:10px;color:#bbb">Supported: .txt · .docx · .xlsx · .pptx · .jpg · .png · .mht</div></div>';

    h+='<button class="btn" style="background:var(--blue);min-width:160px" onclick="runScan()">✦ Scan with Claude</button>';
  } else if(scanState==="processing"){
    h+='<div style="text-align:center;padding:60px 0">';
    h+='<div style="width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>';
    h+='<div style="font-size:14px;color:var(--blue);font-weight:600">Analyzing with Claude…</div>';
    h+='<div style="font-size:11px;color:#999;margin-top:4px">This may take 15–30 seconds</div></div>';
  } else if(scanState==="review"&&scanSuggestions){
    const s=scanSuggestions;
    const total=[s.projects,s.milestones,s.tasks,s.journal].reduce((n,a)=>n+a.length,0);
    const selCount=Object.values(scanSelected).filter(Boolean).length;
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">';
    h+='<div style="font-family:var(--fh);font-size:17px;font-weight:700;color:var(--blue)">Claude found '+total+' items</div><div style="flex:1"></div>';
    h+='<button class="btn sm ol" style="color:#999;border-color:#ddd" onclick="scanReset()">Start Over</button>';
    h+='<button class="btn sm" id="scan-import-btn" style="background:var(--blue)" onclick="applyScanned()">Import '+selCount+' Selected</button></div>';

    const projOptions=[
      ...state.projects.map(p=>({id:p.id,label:p.shortName+' — '+p.name})),

    ];
    const projSel=(ref,uid,type)=>{
      let sel='<select onchange="editScanProject(\''+uid+'\',\''+type+'\',this.value)" style="font-size:11px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;max-width:180px"><option value=""'+(!ref?" selected":"")+'>— None —</option>';

      return sel+'</select>';
    };
    const renderSec=(type,icon,items)=>{
      if(!items.length)return'';
      const allChk=items.every(i=>scanSelected[i._uid]);
      let sh='<div style="margin-bottom:24px">';
      sh+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--blue)">';
      sh+='<span style="font-size:13px;font-weight:700;color:var(--blue)">'+icon+' '+type.charAt(0).toUpperCase()+type.slice(1)+' ('+items.length+')</span><div style="flex:1"></div>';

      items.forEach(item=>{

        sh+='<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 4px;border-bottom:1px solid #f0f0f0'+(low?';opacity:.55':'')+'">';

        if(item.sourceHint)sh+='<span title="'+esc(item.sourceHint)+'" style="font-size:10px;color:#ccc;cursor:help;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.sourceHint.slice(0,32))+(item.sourceHint.length>32?'…':'')+'</span>';
        sh+='</div>';
        if(type==='milestones'){sh+='<div style="margin-top:4px;display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#aaa">Project:</span>'+projSel(item.projectRef,item._uid,type);if(item.target)sh+=' <span style="font-size:10px;color:#aaa">Target: '+item.target+'</span>';sh+='</div>';}
        if(type==='tasks'&&projOptions.length)sh+='<div style="margin-top:4px;display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#aaa">Project:</span>'+projSel(item.projectRef,item._uid,type)+'</div>';
        if(type==='journal')sh+='<div style="margin-top:3px;font-size:10px;color:#aaa">'+esc(item.type||'note')+(item.date?' · '+item.date:'')+'</div>';
        sh+='</div></div>';
      });
      return sh+'</div>';
    };
    h+=renderSec('projects','📁',s.projects);
    h+=renderSec('milestones','🎯',s.milestones);
    h+=renderSec('tasks','✓',s.tasks);
    h+=renderSec('journal','📝',s.journal);
    h+='<div style="padding-top:12px;text-align:right"><button class="btn sm ol" style="color:#999;border-color:#ddd;margin-right:8px" onclick="scanReset()">Start Over</button>';
    h+='<button class="btn sm" style="background:var(--blue)" onclick="applyScanned()">Import '+selCount+' Selected</button></div>';
  }
  h+='</div>';return h;
}
window.runScan=async()=>{
  const files=document.getElementById('scan-files')?.files;
  const paste=(document.getElementById('scan-paste')?.value||'').trim();
  if((!files||!files.length)&&!paste){toast('Add files or paste text first');return;}
  scanState='processing';render();
  const fd=new FormData();
  if(files)[...files].forEach(f=>fd.append('files',f));
  if(paste)fd.append('pasteText',paste);
  try{
    const r=await fetch('/api/scan',{method:'POST',body:fd});
    const data=await r.json();
    if(!data.ok)throw new Error(data.error||'Unknown error');
    scanSuggestions=data.suggestions;
    scanSelected={};
    [...(data.suggestions.projects||[]),...(data.suggestions.milestones||[]),...(data.suggestions.tasks||[]),...(data.suggestions.journal||[])]
      .forEach(item=>{scanSelected[item._uid]=item.confidence>=0.6;});
    scanState='review';render();
  }catch(e){scanState='idle';render();toast('Scan failed: '+e.message);}
};
window.toggleScan=id=>{
  scanSelected[id]=!scanSelected[id];
  const n=Object.values(scanSelected).filter(Boolean).length;
  document.querySelectorAll('#scan-import-btn,#scan-import-btn2').forEach(b=>{if(b)b.textContent='Import '+n+' Selected';});
};
window.selectAllScan=(type,checked)=>{(scanSuggestions[type]||[]).forEach(i=>{scanSelected[i._uid]=checked;});render();};
window.editScanItem=(id,type,val)=>{const arr=scanSuggestions?(scanSuggestions[type]||[]):[];const item=arr.find(i=>i._uid===id);if(!item)return;if(type==='tasks'||type==='journal')item.text=val;else item.name=val;};
window.editScanProject=(id,type,val)=>{const arr=scanSuggestions?(scanSuggestions[type]||[]):[];const item=arr.find(i=>i._uid===id);if(item)item.projectRef=val.startsWith('__new__')?val.replace('__new__',''):val;};
window.scanReset=()=>{scanState='idle';scanSuggestions=null;scanSelected={};scanNoteTitle='';noteView='notes';render();};
window.scanNote=async function(id){
  if(noteEditId){await saveNoteEditor();noteEditId=null;noteEditNote=null;}
  scanNoteTitle='';noteView='scan';scanState='processing';render();
  try{
    const r=await fetch('/api/scan/note/'+id,{method:'POST'});
    const data=await r.json();
    if(!data.ok)throw new Error(data.error||'Scan failed');
    scanNoteTitle=data.noteTitle||'';
    scanSuggestions=data.suggestions;scanSelected={};
    [...(data.suggestions.projects||[]),...(data.suggestions.milestones||[]),...(data.suggestions.tasks||[]),...(data.suggestions.journal||[])]
      .forEach(item=>{scanSelected[item._uid]=item.confidence>=0.6;});
    scanState='review';render();
  }catch(e){scanState='idle';render();toast('Scan failed: '+e.message);}
};
window.applyScanned=async()=>{
  const accepted={projects:[],milestones:[],tasks:[],journal:[]};
  ['projects','milestones','tasks','journal'].forEach(type=>{
    (scanSuggestions[type]||[]).forEach(item=>{
      if(!scanSelected[item._uid])return;
      const{_uid,confidence,sourceHint,...clean}=item;
      accepted[type].push(clean);
    });
  });
  const accNames=new Set(accepted.projects.map(p=>p.name.toLowerCase()));
  accepted.milestones.forEach(m=>{if(m.projectRef&&!state.projects.find(p=>p.id===m.projectRef)&&!accNames.has(m.projectRef.toLowerCase()))m.projectRef=null;});
  try{
    const r=await api('/api/scan/apply',{method:'POST',body:JSON.stringify(accepted)});
    if(r.ok){
      const total=r.added.projects+r.added.milestones+r.added.tasks+r.added.journal;
      toast('Imported '+total+' item'+(total!==1?'s':'')+' — consider refreshing AI Memory');
      scanState='idle';scanSuggestions=null;scanSelected={};noteView='notes';
      await load();render();
    }else toast('Import failed: '+(r.error||'error'));
  }catch(e){toast('Import failed: '+e.message);}
};
window.saveMemory=async()=>{
  const content=document.getElementById('mem-content')?.value||'';
  const r=await api('/api/memory',{method:'PUT',body:JSON.stringify({content})});
  if(r.ok){memoryContent=content;toast('Memory saved');}else toast('Save failed');
};
window.refreshMemory=async()=>{
  const btn=document.getElementById('mem-refresh-btn');
  if(btn){btn.disabled=true;btn.textContent='Refreshing…';}
  try{
    const r=await api('/api/memory/refresh',{method:'POST'});
    if(r.ok){
      memoryContent=r.content||'';
      const ta=document.getElementById('mem-content');
      if(ta)ta.value=memoryContent;
      toast('Memory refreshed');
    }else toast('Refresh failed: '+(r.error||'error'));
  }catch(e){toast('Refresh failed: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='↻ Refresh with Claude';}}
};

// ═══ DAILY BRIEFING ═══
function startBriefingPoll(){
  if(briefingPoll)clearInterval(briefingPoll);
  briefingPoll=setInterval(async()=>{
    const r=await api("/api/briefing").catch(()=>null);
    if(!r)return;
    briefingData=r.data;briefingStatus=r.status||{status:"idle"};
    if(briefingStatus.status!=="running"){clearInterval(briefingPoll);briefingPoll=null;}
    if(!noteEditId) render();
  },5000);
}
function startElapsedTick(){
  if(briefingElapsedTick)clearInterval(briefingElapsedTick);
  briefingElapsedTick=setInterval(()=>{
    if(briefingStatus.status!=="running"){clearInterval(briefingElapsedTick);briefingElapsedTick=null;return;}
    const el=document.getElementById("briefing-elapsed");
    if(!el){clearInterval(briefingElapsedTick);briefingElapsedTick=null;return;}
    const secs=briefingStatus.startedAt?Math.round((Date.now()-new Date(briefingStatus.startedAt))/1000):0;
    el.textContent="This usually takes 1–3 minutes ("+secs+"s elapsed)";
  },1000);
}
window.runBriefing=async()=>{
  briefingStatus={status:"running",startedAt:new Date().toISOString()};render();startElapsedTick();
  const r=await api("/api/briefing/run",{method:"POST"});
  if(r.ok){startBriefingPoll();}
  else{briefingStatus={status:"error",error:r.error||"Could not start briefing"};render();}
};
window.resetBriefing=async()=>{
  if(briefingElapsedTick){clearInterval(briefingElapsedTick);briefingElapsedTick=null;}
  if(briefingPoll){clearInterval(briefingPoll);briefingPoll=null;}
  await api("/api/briefing/reset",{method:"POST"});
  briefingStatus={status:"idle"};render();
};
window.resolveBriefingItem=async(jsonStr,btn)=>{
  const item=JSON.parse(jsonStr);
  btn.disabled=true;btn.textContent="✓";btn.style.color="#27ae60";btn.style.borderColor="#27ae60";
  await api("/api/briefing/resolve",{method:"POST",body:JSON.stringify(item)});
  // Remove from in-memory data so card re-renders without it
  if(briefingData&&briefingData.items){
    briefingData.items=briefingData.items.filter(i=>!(i.from_email===item.from_email&&(i.subject||i.action_required)===item.subject));
    const s=briefingData.summary||{};
    briefingData.summary={p1:(briefingData.items.filter(i=>i.priority==="P1").length),p2:(briefingData.items.filter(i=>i.priority==="P2").length),p3:(briefingData.items.filter(i=>i.priority==="P3").length),p4:(briefingData.items.filter(i=>i.priority==="P4").length)};
  }
  render();
};
function rBriefingCard(){

    h+='</div>';
    const p1=(d.items||[]).filter(i=>i.priority==="P1");
    const p2=(d.items||[]).filter(i=>i.priority==="P2");
    const toShow=[...p1,...p2].slice(0,6);
    if(!toShow.length){
      const metaErr=d.metadata?.error||"";
      if(metaErr){
        h+='<div style="padding:10px;background:#fff8f0;border-radius:4px;border-left:3px solid #E07000">';
        h+='<div style="font-size:11px;color:#E07000;font-weight:600;margin-bottom:4px">⚠ M365 not connected</div>';
        h+='<div style="font-size:10px;color:#666">To scan emails and Teams, configure the Microsoft 365 MCP server in Claude Code settings (<code>claude mcp add</code>). Ask Claude Code: "How do I add Microsoft 365 MCP?" for setup instructions.</div>';
        h+='</div>';
      } else {
        h+='<div style="text-align:center;padding:12px;color:#bbb;font-size:11px">✓ All clear — no critical items found.</div>';
      }
    } else {
      toShow.forEach(item=>{
        const pc=item.priority==="P1"?"var(--red)":"#E07000";
        h+='<div style="display:flex;gap:7px;padding:5px 0;border-bottom:1px solid #f8f8f8;align-items:flex-start">';
        h+='<span style="font-size:8px;font-weight:700;padding:2px 5px;border-radius:6px;background:'+pc+';color:#fff;flex-shrink:0;margin-top:1px">'+esc(item.priority)+'</span>';
        h+='<div style="flex:1;min-width:0">';
        h+='<div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(item.subject||item.action_required||"")+'</div>';
        h+='<div style="font-size:9px;color:#888">'+esc(item.from_name||item.source||"")+(item.deadline?' · '+esc(item.deadline):'')+'</div>';
        if(item.deep_link)h+='<a href="'+esc(item.deep_link)+'" target="_blank" style="font-size:9px;color:var(--blue)">Open →</a>';
        h+='</div>';
        h+='<button title="Mark done — won\'t reappear in future briefings" onclick="resolveBriefingItem('+JSON.stringify(JSON.stringify({from_email:item.from_email,subject:item.subject||item.action_required,source:item.source,reason:"complete"}))+',this)" style="background:none;border:1px solid #ddd;border-radius:4px;padding:2px 6px;font-size:10px;color:#aaa;cursor:pointer;flex-shrink:0" onmouseover="this.style.color=\'#27ae60\';this.style.borderColor=\'#27ae60\'" onmouseout="this.style.color=\'#aaa\';this.style.borderColor=\'#ddd\'">✓</button>';
        h+='</div>';
      });
      const more=(d.items||[]).length-toShow.length;
      if(more>0)h+='<div style="font-size:10px;color:#aaa;text-align:center;padding-top:6px">+'+more+' more items</div>';
    }
  } else {
    h+='<div style="text-align:center;padding:20px;color:#bbb;font-size:11px">No briefing yet for today.<br>It will scan automatically on next launch.</div>';
  }
  h+='</div>';return h;
}

window.addTkTag=(id,tag)=>{const v=tag.trim();if(!v)return;const task=(state.tasks||[]).find(t=>t.id===id);if(!task)return;if(!task.tags)task.tags=[];if(!task.tags.includes(v)){task.tags.push(v);patchTask(id,{tags:task.tags});}};

  const SC={"complete":"#144B2D","in-progress":"#0F3A85","at-risk":"#B8860B","blocked":"#E1251B","not-started":"#999"};
  const SL={"complete":"✓","in-progress":"▸","at-risk":"△","blocked":"✕","not-started":"○"};
  const GS={"in-progress":["var(--blue)","In Progress"],"on-track":["#144B2D","On Track"],"needs-attention":["#B8860B","Needs Attention"],"complete":["#9E9E9E","Complete"]};
  const linkedProjs=state.projects.filter(p=>!p.archived&&(p.goalRefs||[]).some(ref=>{const{year:ry,id:rid}=parseGoalRef(ref);return ry===year&&rid===id;}));
  const linkedNotes=notes.filter(n=>(n.goalRefs||[]).some(ref=>{const{year:ry,id:rid}=parseGoalRef(ref);return ry===year&&rid===id;}));
  const [gc,gl]=GS[g.status]||GS["on-track"];
  let h='<div class="card" style="border-top:4px solid var(--blue)"><div class="card-b" style="border:none;padding-top:14px">';
  h+='<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:20px">';
  h+='<button class="btn sm ol" onclick="clearGoalDetail()" style="flex-shrink:0;margin-top:2px">← Goals</button>';
  h+='<div style="flex:1">';
  h+='<div style="font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'+esc(g.category||'')+'</div>';
  h+='<div style="font-size:17px;font-weight:700;color:#212121;line-height:1.4">'+esc(g.text)+'</div>';
  h+='<div style="margin-top:6px"><span style="display:inline-flex;align-items:center;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;border:1px solid '+gc+';color:'+gc+'">'+esc(gl)+'</span></div>';
  h+='</div></div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;margin-bottom:12px;border-bottom:1px solid #e8edf2">Projects &amp; Milestones'+(linkedProjs.length?' ('+linkedProjs.length+')':'')+'</div>';
  if(linkedProjs.length){
    linkedProjs.forEach(p=>{
      const compCnt=p.milestones.filter(m=>m.status==="complete").length;
      const hLabel=getHealth(p);
      const hColor=hLabel==="ON TRACK"?SC.complete:hLabel==="AT RISK"?SC["at-risk"]:hLabel==="CRITICAL"?SC.blocked:SC.complete;
      const pTasks=(state.tasks||[]).filter(t=>t.project===p.id);
      h+='<div style="background:#f9fafb;border:1px solid #e8edf2;border-radius:6px;padding:12px 14px;margin-bottom:10px">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
      h+='<span style="font-size:11px;font-weight:700;color:#fff;background:var(--blue);padding:2px 7px;border-radius:3px;flex-shrink:0">'+esc(p.shortName)+'</span>';
      h+='<span style="font-size:13px;font-weight:600;color:#212121;flex:1">'+esc(p.name)+'</span>';
      h+='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;border:1px solid '+hColor+';color:'+hColor+'">'+hLabel+'</span>';
      h+='<span style="font-size:10px;color:#aaa">'+compCnt+'/'+p.milestones.length+'</span>';
      h+='</div>';
      p.milestones.forEach(m=>{
        h+='<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f3f3f3">';
        h+='<span style="font-size:13px;width:16px;text-align:center;flex-shrink:0;color:'+(SC[m.status]||"#999")+'">'+SL[m.status]+'</span>';
        h+='<span style="font-size:12px;flex:1;color:'+(m.status==="complete"?"#aaa":"#333")+(m.status==="complete"?";text-decoration:line-through":"")+'">'+esc(m.name)+'</span>';
        if(m.target)h+='<span style="font-size:10px;color:#ccc;flex-shrink:0">'+m.target+'</span>';
        h+='</div>';
      });
      if(pTasks.length){
        h+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid #ececec">';
        h+='<div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Tasks ('+pTasks.length+')</div>';
        pTasks.forEach(t=>{
          h+='<div style="display:flex;align-items:center;gap:8px;padding:2px 0">';

          h+='</div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });
  } else {
    h+='<div style="padding:16px 0;color:#bbb;font-size:12px;font-style:italic">No projects linked to this goal yet. Open a project card and link it via Goals.</div>';
  }
  if(linkedNotes.length){

      h+='</div><span style="font-size:12px;color:#ccc">→</span>';
      h+='</div>';
    });
  }
  h+='</div></div>';
  return h;
}

function buildReportContext(ap){
  const selIds=[...document.querySelectorAll(".re-cb:checked")].map(el=>el.value);
  const projs=selIds.length?ap.filter(p=>selIds.includes(p.id)):ap;
  const dateFrom=document.getElementById("re-from")?.value||"";
  const dateTo=document.getElementById("re-to")?.value||"";
  const notes=document.getElementById("re-notes")?.value||"";
  let ctx="\n\nPROJECT STATUS:\n";
  projs.forEach(p=>{
    const h=gh(p),comp=p.milestones.filter(m=>m.status==="complete").length;
    ctx+="\n"+p.shortName+": "+p.name+" ["+h.l+"] "+comp+"/"+p.milestones.length+" milestones\n";
    p.milestones.filter(m=>m.status!=="not-started").forEach(m=>{ctx+="  - "+m.status+": "+m.name+(m.target?" ("+m.target+")":"")+(m.notes?" — "+m.notes:"")+"\n";});
    if(p.risks?.length){p.risks.forEach(r=>{ctx+="  RISK ["+r.severity+"]: "+r.text+"\n";});}
  });
  const yr=goalYear||new Date().getFullYear();
  const gData=goals[yr];
  if(gData?.goals?.length){
    ctx+="\nGOALS ("+yr+"):\n";
    gData.goals.filter(g=>g.status!=="discontinued").forEach(g=>{ctx+="["+g.category+"] "+g.text+" ["+g.status+"]\n";if(g.description)ctx+="  "+g.description+"\n";});
  }
  const journal=(dateFrom?state.journal.filter(j=>j.date>=dateFrom):state.journal).slice(0,12);
  if(journal.length){ctx+="\nRECENT ACTIVITY:\n";journal.forEach(j=>{const pr=state.projects.find(p=>p.id===j.project);ctx+=j.date+" ["+(pr?.shortName||"ALL")+"] "+j.type+": "+j.text+"\n";});}
  if(notes)ctx+="\nNOTES: "+notes;
  if(dateFrom||dateTo)ctx+="\nREPORT SCOPE: "+(dateFrom||"start")+" → "+(dateTo||"today");
  return ctx;
}

window._mpSel={};window._mpSelLabels={};window._mpPlaceholders={};
window.mpToggle=function(id){
  const d=document.getElementById(id+'-drop');if(!d)return;
  const opening=!d.classList.contains('open');
  document.querySelectorAll('.mp-drop.open').forEach(el=>{el.classList.remove('open');const t=document.getElementById(el.id.replace('-drop','-trigger'));if(t)t.classList.remove('open');});
  if(opening){
    d.classList.add('open');
    const tr=document.getElementById(id+'-trigger');if(tr)tr.classList.add('open');
    const s=document.getElementById(id+'-srch');if(s){s.value='';window.mpFilter(id,'');setTimeout(()=>s.focus(),0);}
    const wrap=document.getElementById(id+'-wrap');
    const close=e=>{if(wrap&&!wrap.contains(e.target)){d.classList.remove('open');if(tr)tr.classList.remove('open');document.removeEventListener('mousedown',close);}};
    setTimeout(()=>document.addEventListener('mousedown',close),0);
  }
};
window.mpFilter=function(id,q){
  const list=document.getElementById(id+'-list');if(!list)return;
  q=(q||'').toLowerCase();
  list.querySelectorAll('.mp-item').forEach(el=>{el.style.display=(!q||(el.dataset.lbl||'').toLowerCase().includes(q))?'':'none';});
};
window.mpPick=function(id,val){
  if(!window._mpSel[id])window._mpSel[id]=new Set();
  if(window._mpSel[id].has(val))window._mpSel[id].delete(val);else window._mpSel[id].add(val);
  const cb=document.getElementById(id+'-cb-'+val);
  if(cb)cb.checked=window._mpSel[id].has(val);
  window.mpRefreshTrigger(id);
};
window.mpRefreshTrigger=function(id){
  const t=document.getElementById(id+'-trigger');if(!t)return;
  const labels=window._mpSelLabels[id]||{};
  const sel=[...(window._mpSel[id]||[])];
  if(!sel.length){t.innerHTML='<span class="mp-trigger-ph">'+esc(window._mpPlaceholders[id]||'None')+'</span><span class="mp-arrow">▾</span>';return;}
  t.innerHTML=sel.map(v=>'<span class="mp-chip-sm">'+esc(labels[v]||v)+'</span>').join(' ')+'<span class="mp-arrow">▾</span>';
};
window.mpGetVals=id=>[...(window._mpSel[id]||[])];
function buildPicker(id,items,selected,placeholder){
  window._mpSel[id]=new Set(selected);
  window._mpSelLabels[id]={};
  window._mpPlaceholders[id]=placeholder;
  items.forEach(it=>{window._mpSelLabels[id][it.val]=it.label;});
  let h='<div class="mp-wrap" id="'+id+'-wrap"><div class="mp-trigger'+(selected.length?' open':'')+'" id="'+id+'-trigger" onclick="mpToggle(\''+id+'\')">';
  if(!selected.length)h+='<span class="mp-trigger-ph">'+esc(placeholder)+'</span>';
  else h+=selected.map(v=>'<span class="mp-chip-sm">'+esc(window._mpSelLabels[id][v]||v)+'</span>').join(' ');

window.runNoteImport=async function(){
  const out=document.getElementById("imp-out");
  if(out)out.innerHTML='<div style="padding:10px 0;color:var(--purple);font-size:12px">✦ Extracting files…</div>';
  const allFiles=[];
  if(window._impFiles.length){
    const fd=new FormData();
    window._impFiles.forEach(f=>fd.append("files",f));
    try{
      const r=await fetch("/api/notes/extract",{method:"POST",body:fd});
      const d=await r.json();
      if(d.ok)allFiles.push(...(d.files||[]));
      else{if(out)out.innerHTML='<div style="color:var(--red);font-size:12px">Extraction failed: '+esc(d.error)+'</div>';return;}
    }catch(e){if(out)out.innerHTML='<div style="color:var(--red);font-size:12px">Upload error: '+esc(e.message)+'</div>';return;}
  }
  const pasted=document.getElementById("imp-paste")?.value||"";
  if(pasted.trim())allFiles.unshift({filename:"Pasted content",text:pasted});
  if(!allFiles.length){if(out)out.innerHTML='<div style="color:#888;font-size:12px">Nothing to import — add files or paste text first.</div>';return;}
  // ZIP pages carry notebook/section from folder structure — show interactive tree
  const zipPages=allFiles.filter(f=>f.filename.endsWith('.zip-page'));
  // MHT pages come through as structured {filename: "Title.mht-page", text}
  // They don't need Claude — migrate directly.
  const mhtPages=allFiles.filter(f=>f.filename.endsWith('.mht-page'));
  const otherFiles=allFiles.filter(f=>!f.filename.endsWith('.zip-page')&&!f.filename.endsWith('.mht-page'));
  if(zipPages.length){
    window._zipPages=zipPages.map(p=>({...p,_sel:true}));
    window._zipGroups=[];
    if(out){out.innerHTML='';renderZipUI();}
    if(otherFiles.length)runClaudeImport(otherFiles,out,true);
    return;
  }
  // For PowerShell bulk exports: parse "Notebook - Section.mht" from source filename
  function parseMhtFilename(src){const b=(src||'').replace(/\.mht(ml)?$/i,'');const i=b.indexOf(' - ');return i!==-1?{notebook:b.slice(0,i).trim(),section:b.slice(i+3).trim()}:{notebook:'OneNote',section:b.trim()||'Imported'};}
  mhtPages.forEach(p=>{if(!p.notebook&&p.sourceFile){const {notebook,section}=parseMhtFilename(p.sourceFile);p.notebook=notebook;p.section=section;}});
  const mhtSources=new Set(mhtPages.map(p=>p.sourceFile).filter(Boolean));
  if(mhtPages.length&&mhtSources.size>1){
    // Multiple .mht files → same tree UI as ZIP
    window._zipPages=mhtPages.map(p=>({...p,_sel:true}));
    window._zipGroups=[];
    if(out){out.innerHTML='';renderZipUI();}
    if(otherFiles.length)runClaudeImport(otherFiles,out,true);
    return;
  }
  if(mhtPages.length){
    // Guess notebook name from original filename
    const srcName=(window._impFiles[0]?.name||'').replace(/\.[^.]+$/,'').replace(/@.*/,'').replace(/[_-]+/g,' ').trim()||'OneNote';
    window._mhtPages=mhtPages.map(p=>({...p,_sel:true}));
    let h='<div>';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">';
    h+='<span style="font-weight:700;font-size:13px;color:var(--blue)">'+mhtPages.length+' pages extracted</span>';
    if(otherFiles.length)h+='<span style="font-size:10px;color:#aaa">+ '+otherFiles.length+' other file(s) — use Claude parse below</span>';
    h+='<div style="flex:1"></div>';
    h+='<span style="font-size:11px;color:#888;white-space:nowrap">Notebook:</span>';
    h+='<input id="imp-nb-name" value="'+esc(srcName)+'" style="font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #ddd;width:140px">';
    h+='<span style="font-size:11px;color:#888;white-space:nowrap">Section:</span>';
    h+='<input id="imp-sec-name" value="" placeholder="(optional)" style="font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #ddd;width:120px">';
    h+='<label style="font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px"><input type="checkbox" id="mht-sel-all" checked onchange="mhtSelAll(this.checked)"> All</label>';
    h+='</div>';
    h+='<div style="border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="max-height:380px;overflow-y:auto">';
    mhtPages.forEach((p,i)=>{
      const title=p.filename.replace(/\.mht-page$/,'');
      const preview=p.text.slice(0,100).replace(/\n/g,' ');
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f5f5f5">';
      h+='<input type="checkbox" id="mht-p-'+i+'" checked onchange="mhtSelOne('+i+',this.checked)">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:12px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(title)+'</div>';
      h+='<div style="font-size:10px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(preview)+'</div>';
      h+='</div><div style="font-size:10px;color:#bbb;flex-shrink:0">'+Math.round(p.text.length/1000)+'K</div>';
      h+='</div>';
    });
    h+='</div></div>';
    h+='<button class="btn" style="background:var(--blue);font-size:12px;padding:8px 20px" id="mht-save-btn" onclick="saveMhtNotes()">&#8595; Import '+mhtPages.length+' Notes</button>';
    h+='</div>';
    if(out)out.innerHTML=h;
    if(otherFiles.length){
      // Still run Claude on the non-MHT portion below
      runClaudeImport(otherFiles,out,true);
    }
    return;
  }
  // No MHT pages — run Claude parse on all files
  runClaudeImport(otherFiles.length?otherFiles:allFiles,out,false);
};

  window._zipPages.forEach((p,i)=>{
    const nb=p.notebook||'';const sec=p.section||'';

    if(!tree[key])tree[key]={nb,sec,indices:[]};
    tree[key].indices.push(i);
  });
  window._zipGroups=Object.values(tree).sort((a,b)=>a.nb.localeCompare(b.nb)||a.sec.localeCompare(b.sec));
  // Build nb→groups map
  const nbMap={};
  window._zipGroups.forEach((g,gid)=>{if(!nbMap[g.nb])nbMap[g.nb]=[];nbMap[g.nb].push({gid,sec:g.sec,indices:g.indices});});

  h+='</div>';
  Object.entries(nbMap).sort(([a],[b])=>a.localeCompare(b)).forEach(([nb,groups])=>{
    const allIdx=groups.flatMap(g=>g.indices);
    const nbSel=allIdx.filter(i=>window._zipPages[i]._sel).length;
    const nbGids=groups.map(g=>g.gid);
    h+='<div style="border:1px solid #dde3f0;border-radius:8px;margin-bottom:10px;overflow:hidden">';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(135deg,#f0f4ff,#e8eeff);border-bottom:1px solid #dde3f0">';
    h+='<input type="checkbox" '+(nbSel===allIdx.length&&allIdx.length>0?'checked':'')+' onchange="zipSelNb('+JSON.stringify(nbGids)+',this.checked)" style="accent-color:var(--blue);cursor:pointer;width:14px;height:14px;flex-shrink:0">';
    h+='<span style="font-size:14px;flex-shrink:0">&#128212;</span>';
    h+='<input data-nbcurrent="'+esc(nb)+'" value="'+esc(nb)+'" placeholder="(No Notebook)" oninput="zipRenameNb(this)" onblur="renderZipUI()" style="font-weight:700;font-size:12px;color:var(--blue);border:none;background:transparent;flex:1;outline:none;min-width:100px;font-family:var(--fh)">';
    h+='<span style="font-size:10px;color:#8898bb;background:#dde8ff;padding:2px 8px;border-radius:10px;flex-shrink:0">'+nbSel+'/'+allIdx.length+'</span>';
    h+='</div>';
    groups.sort((a,b)=>a.sec.localeCompare(b.sec)).forEach(({gid,sec,indices})=>{
      const secSel=indices.filter(i=>window._zipPages[i]._sel).length;
      h+='<div style="border-bottom:1px solid #f2f2f2;padding:0 12px 0 28px">';
      h+='<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f8f8f8">';
      h+='<input type="checkbox" '+(secSel===indices.length&&indices.length>0?'checked':'')+' onchange="zipSelGroup('+gid+',this.checked)" style="accent-color:var(--blue);cursor:pointer;width:13px;height:13px;flex-shrink:0">';
      h+='<span style="font-size:11px;flex-shrink:0">&#128193;</span>';
      if(sec){h+='<input data-gid="'+gid+'" data-seccurrent="'+esc(sec)+'" value="'+esc(sec)+'" oninput="zipRenameSec(this)" onblur="renderZipUI()" style="font-size:11px;font-weight:600;color:#444;border:none;background:transparent;flex:1;outline:none;min-width:80px">';}
      else{h+='<span style="font-size:11px;color:#bbb;font-style:italic;flex:1">(No section)</span>';}
      h+='<span style="font-size:10px;color:#ccc;flex-shrink:0">'+indices.length+'</span>';
      h+='</div>';
      h+='<div style="padding-left:16px">';
      indices.forEach(i=>{
        const p=window._zipPages[i];
        const title=(p.filename||'').replace(/\.(zip|mht)-page$/,'');
        const preview=(p.text||'').slice(0,90).replace(/\n/g,' ');
        h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #fafafa">';

window.saveZipNotes=async function(){
  const pages=window._zipPages.filter(p=>p._sel);
  if(!pages.length)return toast('Select at least one page');
  const btn=document.getElementById('zip-save-btn');
  if(btn){btn.disabled=true;btn.textContent='Importing…';}
  let saved=0;
  for(const p of pages){
    const title=(p.filename||'').replace(/\.zip-page$/,'');
    const body={title,notebook:p.notebook||'',section:p.section||'',content:p.text,goalRefs:[],projectRefs:[]};
    if(p.tempId)body.richContentTempId=p.tempId;
    await api('/api/notes',{method:'POST',body:JSON.stringify(body)});

window.runClaudeImport=async function(files,out,append){
  function chunkText(text,max=5000){const paras=text.split(/\n\n+/);const chunks=[];let cur="";for(const p of paras){if(cur.length+p.length>max&&cur){chunks.push(cur);cur="";}cur+=(cur?"\n\n":"")+p;}if(cur)chunks.push(cur);return chunks;}
  const chunks=[];files.forEach(f=>{chunkText(f.text).forEach(c=>{chunks.push({filename:f.filename,text:c});});});
  const statusEl=document.createElement('div');statusEl.style.cssText='color:var(--purple);font-size:12px;padding:10px 0';statusEl.textContent='✦ Parsing chunk 1/'+chunks.length+'…';
  if(append&&out)out.appendChild(statusEl);else if(out)out.innerHTML='';
  if(!append&&out)out.appendChild(statusEl);
  const allParsed=[];
  const notePrompt=(fname,txt)=>'Parse the following content (from "'+fname+'") into discrete notes. Return ONLY a valid JSON array, no other text.\nEach element: {"title":"...","content":"...","notebook":"...","section":"..."}\nUse the filename and content to suggest appropriate notebook/section groupings.\n\nContent:\n'+txt;
  for(let i=0;i<chunks.length;i++){
    statusEl.textContent='✦ Parsing chunk '+(i+1)+'/'+chunks.length+'…';
    try{const r=await api("/api/claude",{method:"POST",body:JSON.stringify({prompt:notePrompt(chunks[i].filename,chunks[i].text)})});if(r.ok){try{const m=r.text.match(/\[[\s\S]*\]/);const p=JSON.parse(m?m[0]:r.text);allParsed.push(...p);}catch(e){}}}catch(e){}
  }
  const seen=new Set();
  const deduped=allParsed.filter(n=>{const k=(n.title||"").toLowerCase().trim();if(seen.has(k))return false;seen.add(k);return true;});
  if(!deduped.length){statusEl.textContent='No notes found in these files.';return;}
  window._importNotes=deduped;
  let ph='<div style="margin-top:4px"><div style="font-size:11px;font-weight:700;color:#444;margin-bottom:8px">'+deduped.length+' notes found — review and save:</div><div style="max-height:360px;overflow-y:auto">';
  deduped.forEach((n,i)=>{
    ph+='<div style="background:#f9f9f9;border:1px solid #eee;border-radius:6px;padding:10px;margin-bottom:8px">';
    ph+='<input data-i="'+i+'" data-f="title" value="'+esc(n.title||"")+'" style="font-weight:600;font-size:12px;width:100%;box-sizing:border-box;border:none;background:transparent;border-bottom:1px solid #eee;margin-bottom:6px;padding:2px 0">';
    ph+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
    ph+='<input data-i="'+i+'" data-f="notebook" value="'+esc(n.notebook||"")+'" placeholder="Notebook" style="font-size:11px;padding:3px 6px;border-radius:3px;border:1px solid #ddd">';
    ph+='<input data-i="'+i+'" data-f="section" value="'+esc(n.section||"")+'" placeholder="Section" style="font-size:11px;padding:3px 6px;border-radius:3px;border:1px solid #ddd">';
    ph+='</div></div>';
  });
  ph+='</div><div style="display:flex;gap:8px;margin-top:10px;align-items:center"><button class="btn sm" style="background:var(--blue)" onclick="saveImportedNotes()">Save '+deduped.length+' Notes</button><button class="btn sm ol" style="color:#999;border-color:#999" onclick="noteView=\'notes\';render()">Cancel</button></div></div>';
  const resultEl=document.createElement('div');resultEl.innerHTML=ph;
  if(out)out.appendChild(resultEl);
  statusEl.remove();
  out.querySelectorAll("input[data-i]").forEach(el=>{el.addEventListener("input",()=>{window._importNotes[+el.dataset.i][el.dataset.f]=el.value;});});
};

window.obsidianPull=async function(){
  if(!confirm('Pull from Obsidian vault? This will add any new data found in vault files to your profile. Existing data is never removed.'))return;
  toast('Pulling from Obsidian vault…');
  const r=await api('/api/obsidian/pull',{method:'POST',body:JSON.stringify({})});
  if(!r.ok){toast('Pull failed: '+(r.error||'error'));return;}
  if(!r.merged){toast(r.message||'No vault content found');return;}
  const pr=await api('/api/profile',{method:'PATCH',body:JSON.stringify(r.merged)});
  if(pr.ok){
    profile=pr.profile;memoryContent=profile.memory||'';render();
    const s=r.additionSummary||{};
    const added=Object.entries(s).filter(([,n])=>n>0).map(([k,n])=>n+' '+k).join(', ');
    toast('Synced from Obsidian'+(added?' — added: '+added:'  (no new items found)'));
  }else toast('Save failed: '+(pr.error||'error'));
};

function rNotes(){
  const allNbsRaw=[...new Set(notes.map(n=>n.notebook).filter(Boolean))];
  const secsByNb={};notes.forEach(n=>{if(n.notebook&&n.section){if(!secsByNb[n.notebook])secsByNb[n.notebook]=[];if(!secsByNb[n.notebook].includes(n.section))secsByNb[n.notebook].push(n.section);}});
  allNbsRaw.forEach(n=>{if(!noteNbOrder.includes(n))noteNbOrder.push(n);});
  const allNbs=noteNbOrder.filter(n=>allNbsRaw.includes(n));
  Object.keys(secsByNb).forEach(nb=>{if(!noteSecOrder[nb])noteSecOrder[nb]=[];secsByNb[nb].forEach(s=>{if(!noteSecOrder[nb].includes(s))noteSecOrder[nb].push(s);});});

  let h='<div class="card" style="border-top:4px solid #5B4FCF;padding:0"><div class="card-b" style="padding:0">';
  h+='<div class="notes-layout">';

  // Sidebar
  h+='<div class="notes-sidebar">';
  h+='<div class="nb-row'+((!nFilter.nb&&!nFilter.sec)?" on":"")+'" onclick="setNoteFilter(null,null)" style="'+((!nFilter.nb&&!nFilter.sec)?"color:var(--blue)":"color:#333")+'">&#128196; All Notes <span style="margin-left:auto;font-size:10px;color:#999;font-weight:400">'+notes.length+'</span></div>';
  allNbs.forEach(nb=>{
    const nbCount=notes.filter(n=>n.notebook===nb).length;
    const open=noteNbOpen[nb];
    const nbE=nb.replace(/'/g,"\\'");
    h+='<div class="nb-row'+(nFilter.nb===nb&&!nFilter.sec?" on":"")+'" onclick="event.stopPropagation();togNoteNb(\''+nbE+'\')">'+(open?"▾":"▸")+' <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(nb)+'</span><span style="display:flex;align-items:center;gap:2px;flex-shrink:0"><span style="font-size:10px;color:#999;font-weight:400">'+nbCount+'</span><button onclick="event.stopPropagation();moveNb(\''+nbE+'\', -1)" title="Move up" class="ord-btn">▲</button><button onclick="event.stopPropagation();moveNb(\''+nbE+'\', 1)" title="Move down" class="ord-btn">▼</button></span></div>';
    if(open){
      const ordSecs=(noteSecOrder[nb]||[]).filter(s=>secsByNb[nb]?.includes(s));
      ordSecs.forEach(sec=>{
        const secCount=notes.filter(n=>n.notebook===nb&&n.section===sec).length;
        const secE=sec.replace(/'/g,"\\'");
        h+='<div class="sec-row'+(nFilter.nb===nb&&nFilter.sec===sec?" on":"")+'" onclick="event.stopPropagation();setNoteFilter(\''+nbE+'\',\''+secE+'\')"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(sec)+'</span><span style="display:flex;align-items:center;gap:2px;flex-shrink:0"><span style="font-size:10px;color:#999">'+secCount+'</span><button onclick="event.stopPropagation();moveSec(\''+nbE+'\',\''+secE+'\', -1)" title="Move up" class="ord-btn">▲</button><button onclick="event.stopPropagation();moveSec(\''+nbE+'\',\''+secE+'\', 1)" title="Move down" class="ord-btn">▼</button></span></div>';
      });
    }
  });
  h+='<div style="padding:8px 12px;margin-top:8px;display:flex;flex-direction:column;gap:6px">';
  h+='<button class="btn sm ol" style="font-size:10px;width:100%" onclick="openNoteModal(null)">+ New Note</button>';
  h+='<button class="btn sm ol" style="font-size:10px;width:100%;color:var(--blue);border-color:var(--blue)" onclick="window._impFiles=[];noteView=\'import\';render()">&#11019; Import Notes</button>';
  h+='<button class="btn sm ol" style="font-size:10px;width:100%;color:#5B4FCF;border-color:#5B4FCF" onclick="scanState=\'idle\';noteView=\'scan\';render()">&#10022; Scan with Claude</button>';
  h+='<button class="btn sm ol" style="font-size:10px;width:100%;color:var(--green);border-color:var(--green)" onclick="noteExportMode=!noteExportMode;noteExportSel=new Set();render()">&#8659; Export .docx</button>';
  h+='</div>';
  h+='</div>';

  // Main area
  h+='<div class="notes-main">';
  if(noteEditId!==null){
    h+=rNoteEditor();
  } else if(noteView==="import"){
    h+=rNoteImport();
  } else if(noteView==="scan"){
    h+=rNotesScan();
  } else {
    const ns=noteSearch.toLowerCase();
    let visible=notes.filter(n=>{
      if(nFilter.nb&&n.notebook!==nFilter.nb)return false;
      if(nFilter.sec&&n.section!==nFilter.sec)return false;
      if(ns&&!(n.title.toLowerCase().includes(ns)||n.content.toLowerCase().includes(ns)))return false;

      h+='<div style="flex:1"></div>';
      const selN=noteExportSel.size;

      h+='<button class="btn sm" style="background:var(--green);font-size:10px" '+(selN===0?'disabled':'')+' onclick="downloadNotesDocx()">&#8659; Download '+selN+' Note'+(selN!==1?'s':'')+' as .docx</button>';
